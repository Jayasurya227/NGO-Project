services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ngo
      POSTGRES_PASSWORD: ngo_dev_pass
      POSTGRES_DB: ngo_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --requirepass ngo_redis_pass

volumes:
  postgres_data:
