version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ngo-impact-platform-postgres
    environment:
      POSTGRES_USER: ngo
      POSTGRES_PASSWORD: ngo_password
      POSTGRES_DB: ngo_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ngo-network

  redis:
    image: redis:7-alpine
    container_name: ngo-impact-platform-redis
    command: redis-server --requirepass ngo_redis_pass
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ngo-network

volumes:
  postgres_data:
  redis_data:

networks:
  ngo-network:
    driver: bridge
