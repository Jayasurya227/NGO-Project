services:
  # 1. API Server (Fastify)
  - type: web
    name: api-server
    env: node
    plan: starter
    buildCommand: pnpm install && pnpm --filter @ngo/api-server build
    startCommand: pnpm --filter @ngo/api-server start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ngo-db
          property: connectionString
      - fromGroup: common-env

  # 2. Donor Portal (Next.js)
  - type: web
    name: donor-portal
    env: node
    plan: starter
    buildCommand: pnpm install && pnpm --filter donor-portal build
    startCommand: pnpm --filter donor-portal start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: api-server
          property: host
      - fromGroup: common-env

  # 3. Web Admin (Next.js)
  - type: web
    name: web-admin
    env: node
    plan: starter
    buildCommand: pnpm install && pnpm --filter web-admin build
    startCommand: pnpm --filter web-admin start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: api-server
          property: host
      - fromGroup: common-env

  # 4. Background Workers
  - type: worker
    name: queue-worker
    env: node
    plan: starter
    buildCommand: pnpm install && pnpm --filter @ngo/queue build
    startCommand: pnpm workers
    envVars:
      - key: NODE_ENV
        value: production
      - fromGroup: common-env

databases:
  - name: ngo-db
    plan: free

envVarGroups:
  - name: common-env
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: REDIS_URL
        sync: false # Set manually in Render dashboard from Upstash or create Render Redis
